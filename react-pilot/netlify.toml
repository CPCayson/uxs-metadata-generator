# Logs: Netlify → your site → Functions → `db` (or Deploys → a deploy → Function logs).
# The `db` handler logs each call as `[db] <fn> ok|stateless …ms` and errors with timing + stack.

# Local dev: same-origin `/api/*` → functions (run from `react-pilot/`).
# App URL: http://localhost:8888 (proxy). Vite alone: http://localhost:5173 (`npm run dev`).
# Usage: `npm run dev:netlify` — use the URL Netlify prints if 8888 is taken.
# Ensure nothing else is bound to 5173 (Vite must match `targetPort` or module loads fail on 8888).
[dev]
  # Explicit Vite detection so Netlify Dev proxies /@vite/*, /src/*, etc. to the
  # framework server instead of treating them like static files or SPA rewrites.
  framework = "vite"
  command = "npm run dev"
  port = 8888
  targetPort = 5173
  autoLaunch = false

[build]
  command   = "npm run build"
  publish   = "dist"
  functions = "netlify/functions"

# Route /api/* → Netlify Functions. Must come BEFORE the SPA catch-all.
[[redirects]]
  from   = "/api/:splat"
  to     = "/.netlify/functions/:splat"
  status = 200
  force  = true

# SPA: send non-API paths to index.html (production deploys). With `framework = "vite"`,
# Netlify Dev should proxy module URLs to Vite on `targetPort` — do not add `/*` in
# `public/_redirects` or every dev request (including /src/*.jsx) rewrites to HTML.
[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200

[build.environment]
  # Netlify build image; keep in sync with local `nvm use` when debugging CI.
  NODE_VERSION = "22"
