# Logs: Netlify → your site → Functions → `db` (or Deploys → a deploy → Function logs).
# The `db` handler logs each call as `[db] <fn> ok|stateless …ms` and errors with timing + stack.

# Local dev: same-origin `/api/*` → functions (run from `react-pilot/`).
# App URL: http://localhost:8888 (proxy). Vite alone: http://localhost:5173 (`npm run dev`).
# Usage: `npm run dev` (from `react-pilot/` or via `npm --prefix react-pilot run dev`) — uses
# `scripts/run-netlify-dev.mjs` so cwd is always this folder; Netlify runs `npm run dev:vite` for Vite.
# Ensure nothing else is bound to 5173 (Vite must match `targetPort` or module loads fail on 8888).
[dev]
  # Netlify: if both `command` and `targetPort` are set, `framework` must be
  # `#custom` — otherwise the CLI runs a built-in framework server on
  # `targetPort` and still executes `command` (two Vites → port 5173 busy).
  # See file-based configuration → Netlify Dev (`[dev]`).
  framework = "#custom"
  # Must be Vite only — `npm run dev` is Netlify; nesting Netlify breaks functions / ports.
  command = "npm run dev:vite"
  port = 8888
  targetPort = 5173
  autoLaunch = false
  # Do not use `[build].publish` (dist/) here: after `vite build`, `dist/_redirects`
  # contains the SPA catch-all and Netlify Dev merges publish-dir redirects, which
  # breaks module URLs the same way as `[[redirects]] /*` in this file.
  publish = "netlify-dev-static"

[build]
  command   = "npm run build"
  publish   = "dist"
  functions = "netlify/functions"

# Route /api/* → Netlify Functions (explicit paths first — some dev/prod stacks
# mishandle :splat for hyphenated function names like `comet-proxy`).
[[redirects]]
  from   = "/api/comet-proxy"
  to     = "/.netlify/functions/comet-proxy"
  status = 200
  force  = true

[[redirects]]
  from   = "/api/db"
  to     = "/.netlify/functions/db"
  status = 200
  force  = true

[[redirects]]
  from   = "/api/:splat"
  to     = "/.netlify/functions/:splat"
  status = 200
  force  = true

# SPA fallback for **production** is emitted to `dist/_redirects` on `vite build`
# (see `viteNetlifySpaRedirects` in `vite.config.js`). Do not add `/* → /index.html`
# here: `netlify dev` applies `netlify.toml` redirects before the Vite proxy, so a
# catch-all rewrite serves HTML for `/@vite/client`, `/src/*`, etc. (wrong MIME).
# Also avoid a catch-all in `public/_redirects` — Netlify Dev applies that in local
# dev the same way.

[build.environment]
  # Netlify build image; keep in sync with local `nvm use` when debugging CI.
  NODE_VERSION = "22"
